<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGDEA API Docs</title>
  <style>
    :root {
      --ink: #132238;
      --muted: #5b6b82;
      --line: #d9e0e8;
      --panel: rgba(255, 255, 255, 0.88);
      --accent: #0f766e;
      --accent-soft: #dff6f1;
      --bg-a: #f3efe4;
      --bg-b: #dceaf7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(19, 34, 56, 0.12), transparent 30%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
    }

    .shell {
      min-height: 100vh;
      padding: 28px;
    }

    .hero {
      max-width: 1200px;
      margin: 0 auto 22px;
      background: var(--panel);
      border: 1px solid rgba(19, 34, 56, 0.08);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(19, 34, 56, 0.08);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
      max-width: 70ch;
      line-height: 1.6;
    }

    .toolbar {
      max-width: 1200px;
      margin: 0 auto 22px;
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(19, 34, 56, 0.08);
      border-radius: 24px;
      padding: 22px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(19, 34, 56, 0.08);
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--ink);
    }

    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .quick-links a {
      display: block;
      padding: 12px 14px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 600;
      text-align: center;
    }

    .docs-frame {
      max-width: 1200px;
      margin: 0 auto;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(19, 34, 56, 0.08);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(19, 34, 56, 0.08);
    }

    #redoc-container {
      min-height: 75vh;
    }

    @media (max-width: 880px) {
      .shell {
        padding: 16px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .hero,
      .panel,
      .docs-frame {
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <span class="eyebrow">Redocly Portal</span>
      <h1>Documentacion unificada de SGDEA</h1>
      <p>
        Este portal centraliza los 6 microservicios. Puedes cambiar entre APIs desde el selector y
        seguir manteniendo Swagger UI disponible en cada servicio para pruebas rapidas.
      </p>
    </section>

    <section class="toolbar">
      <div class="panel">
        <label class="label" for="service-select">Microservicio</label>
        <select id="service-select">
          <option value="gateway">Gateway</option>
          <option value="identity-service">Identity Service</option>
          <option value="document-service">Document Service</option>
          <option value="metadata-service">Metadata Service</option>
          <option value="audit-service">Audit Service</option>
          <option value="search-service">Search Service</option>
        </select>
      </div>

      <div class="panel">
        <span class="label">Accesos rapidos</span>
        <div class="quick-links">
          <a href="http://localhost:8080/swagger-ui.html" target="_blank" rel="noreferrer">Gateway</a>
          <a href="http://localhost:8081/swagger-ui.html" target="_blank" rel="noreferrer">Identity</a>
          <a href="http://localhost:8082/swagger-ui.html" target="_blank" rel="noreferrer">Document</a>
          <a href="http://localhost:8083/swagger-ui.html" target="_blank" rel="noreferrer">Metadata</a>
          <a href="http://localhost:8084/swagger-ui.html" target="_blank" rel="noreferrer">Audit</a>
          <a href="http://localhost:8086/swagger-ui.html" target="_blank" rel="noreferrer">Search</a>
        </div>
      </div>
    </section>

    <section class="docs-frame">
      <div id="redoc-container"></div>
    </section>
  </div>

  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  <script>
    const specs = {
      "gateway": "/api-docs/gateway",
      "identity-service": "/api-docs/identity-service",
      "document-service": "/api-docs/document-service",
      "metadata-service": "/api-docs/metadata-service",
      "audit-service": "/api-docs/audit-service",
      "search-service": "/api-docs/search-service"
    };

    const select = document.getElementById("service-select");
    const mountNode = document.getElementById("redoc-container");

    function renderSpec(serviceName) {
      Redoc.init(specs[serviceName], {
        scrollYOffset: 12,
        hideDownloadButton: false,
        theme: {
          colors: {
            primary: {
              main: "#0f766e"
            }
          },
          typography: {
            fontFamily: '"IBM Plex Sans", sans-serif',
            headings: {
              fontFamily: '"Space Grotesk", sans-serif'
            }
          }
        }
      }, mountNode);
    }

    select.addEventListener("change", (event) => {
      renderSpec(event.target.value);
    });

    renderSpec(select.value);
  </script>
</body>
</html>
